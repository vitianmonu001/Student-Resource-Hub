<html lang="en">
<head>

    <title>Signup</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <div>
        <h2 id="fo">Student sign Up</h2>

        <form id="fo">
            <label id="fo">Full Name:</label><br>
            <input type="text" name="fullname">
        <br>
        <br>
            <label id="fo">College Name:</label><br>
            <input type="text" name="College name">
        <br>
        <br>
            <label id="fo">Email:</label><br>
            <input type="email" name="email">
        <br>
        <br>
            <label id="fo">Course:</label><br>
            <input type="text" name="course">
        <br>
        <br>
            <label id="fo">Password:</label><br>
            <input type="password" name="password">
        <br>
        <br>
        <button id="bu">Submit</button>
        </form> 
    </div>   
</body>
